<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>台北市快樂的樹 WebAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <!-- 引入 WebAR 引擎 (A-Frame & AR.js) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* 讓網頁滿版，隱藏滾動條 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* 📌 關鍵：PNG 邊框疊加層 (UI Overlay) */
    #ui-overlay {
      position: absolute;
      top: 50;
      left: 50;
      transform: translate(-50%, -50%);
      width: 50%;
      height: 50%;
      z-index: 9999; /* 保證放在 3D 與鏡頭畫面之上 */
      pointer-events: none; /* 穿透點擊，不影響畫面互動 */
      
      /* 載入你的 PNG 圖檔 */
      background-image: url('treesemi.png');
      background-size: contain; /* 自動縮放適應手機螢幕 */
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>

  <!-- UI 疊加層（呈現你的文字 PNG） -->
  <div id="ui-overlay"></div>

  <!-- AR 3D 場景 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    
    <!-- 3D 組合物件：透明線框樹 (放在相機前方 3 米處，並自動旋轉) -->
    <!-- AR 相機 -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

</body>
</html>
