<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>台北市快樂的樹 WebAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <!-- 引入 WebAR 引擎 (A-Frame & AR.js) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 📌 修改重點 1：尺寸 50% 且畫面絕對置中 */
    #ui-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* 向上與向左偏移 50% 達到完美置中 */
      width: 50%;
      height: 50%;
      z-index: 9999;
      pointer-events: none;
      
      background-image: url('treesemi.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>

  <!-- UI 疊加層（置中的 PNG 圖檔） -->
  <div id="ui-overlay"></div>

  <!-- 📌 修改重點 2：加上 vr-mode-ui="enabled: false" 關閉 VR 圖示，且移除所有 3D 模型 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">

    <!-- AR 相機（僅呈現即時鏡頭畫面） -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  </a-scene>

</body>
</html>
